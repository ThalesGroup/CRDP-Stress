#
# SECTION:  Ingress Deployment (NGINX Ingress Controller)
# This section deploys an Ingress resource for host-based routing to crdp.test256.io.
# It relies on the MicroK8s ingress addon, which runs the NGINX Ingress Controller as a
# DaemonSet with hostNetwork=true, so the controller listens on ports 80/443 of every
# node's IP directly. MetalLB is NOT required.
#
# Traffic to crdp.test256.io reaches any node IP on port 80, and the ingress controller
# routes it to the appropriate pod via the rules defined below. For high availability,
# point DNS at multiple node IPs or put round-robin DNS / an external load balancer in
# front of the nodes.
#
# See makeSecretandDeploy.sh for full prerequisites and deployment steps.
#
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crdp-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 4096M # reqd to accept large payloads
spec:
  ingressClassName: nginx
  rules:
  - host: crdp.test256.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: crdp-service
            port:
              number: 8090
