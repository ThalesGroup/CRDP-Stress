#
# SECTION:  Ingress Deployment (NGINX Ingress Controller)
# This section deploys an Ingress resource for host-based routing to crdp.test256.io.
# It relies on the MicroK8s ingress addon (the NGINX Ingress Controller DaemonSet).
# MetalLB is NOT required.
#
# IMPORTANT: The MicroK8s ingress addon does NOT enable hostNetwork on the controller
# DaemonSet by default (observed on MicroK8s v1.33.9), so the controller pods get CNI
# IPs (10.1.x.x) and nothing binds to ports 80/443 on the node's physical interface.
# makeSecretandDeploy.sh detects this and patches the DaemonSet to set
# hostNetwork=true + dnsPolicy=ClusterFirstWithHostNet before applying this manifest.
# Deploying this Ingress without that patch will result in "No route to host" from
# clients even though the pods and Ingress resource look healthy.
#
# Once patched, traffic to crdp.test256.io reaches any node IP on port 80, and NGINX
# load-balances requests across all CRDP backend pods via crdp-service. For Layer-1
# load balancing across nodes, use round-robin DNS or put an external load balancer
# in front of the node IPs.
#
# See makeSecretandDeploy.sh for full prerequisites and deployment steps.
#
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crdp-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 4096M # reqd to accept large payloads
spec:
  ingressClassName: nginx
  rules:
  - host: crdp.test256.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: crdp-service
            port:
              number: 8090
