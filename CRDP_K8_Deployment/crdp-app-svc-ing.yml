#
# Combined Kubernetes file for deploying CRDP across a multi-node, multi-pod environment
#
# SECTION:  Pod Deployment
#
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    run: crdp
  name: crdp-deployment
spec:
  template:
     metadata:
        name: crdp
        labels:
          run: crdp
     spec:
      containers:
        - image: thalesciphertrust/ciphertrust-restful-data-protection:latest
          imagePullPolicy: Always
          name: crdp-image
          env:
            - name: KEY_MANAGER_HOST
              value: "${KEY_MANAGER_HOST}"
            - name: SERVER_MODE
              value: "no-tls"
            - name: REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: crdp-secret-name
                  key: regtoken
          ports:
            - containerPort: 8090
          # PERF: CRDP protect/reveal is CPU-bound (FPE tokenization). With no
          # requests the scheduler packs pods blindly and nodes plateaued at
          # ~80% under load; setting a request makes placement deterministic and
          # pushed utilization to ~94% (measured). 1500m x 24 pods = 36 cores of
          # requests, which fits the 3x16-core cluster with headroom for system
          # pods. NOTE: no CPU limit is set on purpose so pods can burst into
          # spare cores. This tuning reaches the ~48-core physical ceiling
          # (~650k protect cards/s); exceeding it requires MORE NODES, not more
          # pods (48 pods measured no faster than 24 on this hardware).
          resources:
            requests:
              cpu: "1500m"
      # PERF: keep replicas evenly balanced across all nodes. An unbalanced
      # spread (observed 24/16/8 when packing 48 pods) left a whole node at ~35%
      # while others saturated, wasting cores. ScheduleAnyway avoids blocking
      # rollout if a node is temporarily full.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              run: crdp
  # PERF: 24 pods (~1 per 2 cores on the current 3x16-core cluster) is near
  # optimal for THIS hardware. To approach 1,000,000 protect cards/sec, add
  # worker nodes (~+2 sixteen-core nodes -> ~80 cores) and raise replicas to
  # keep ~1 pod per 1.5-2 cores; core count is the throughput lever, not pods.
  replicas: 24
  selector:
      matchLabels:
        run: crdp

---
#
# SECTION:  Service Deployment
#
apiVersion: v1
kind: Service
metadata:
  labels:
    run: crdp
  name: crdp-service
spec:
  selector:
    run: crdp
  type: NodePort
  ports:
    - port: 8090
      nodePort: 32085

---
#
# SECTION:  Access Notes
#
# Default (load-balanced) access:
#   The default deployment path in makeSecretandDeploy.sh applies crdp-ingress.yml, which
#   exposes CRDP via host-based routing through the NGINX Ingress Controller at:
#     http://$CRDP_HOST   (auto-detected by the deploy script; see README "Configuration")
#   The Service above remains type: NodePort so that both the Ingress path and the direct
#   NodePort fallback can coexist without modification.
#
# Alternative (NodePort-only) access:
#   If the Ingress path is not used, the NodePort service above exposes CRDP directly at:
#     http://<any-node-ip>:32085
#   To use this path, comment out the "kubectl apply -f crdp-ingress.yml" line in
#   makeSecretandDeploy.sh.
#
