# Scrape jobs to append to /etc/prometheus/prometheus.yml on prometheus.test256.io
# (192.168.1.186), under the existing top-level `scrape_configs:` key.
#
# This file is a TEMPLATE. `__K8S_TOKEN__` must be replaced with the Kubernetes
# ServiceAccount token before use:
#
#   TOKEN=$(kubectl -n monitoring get secret prometheus-token \
#             -o jsonpath='{.data.token}' | base64 -d)
#   sed "s|__K8S_TOKEN__|$TOKEN|g" scrape_configs.yml > /tmp/jobs.yml
#
# The rendered file contains a credential -- never commit it.
#
# Why the token is inlined (`authorization.credentials`) rather than pointed at
# via `credentials_file`: on 192.168.1.186 only the single FILE
# /etc/prometheus/prometheus.yml is bind-mounted into the container, not its
# directory, so a sibling token file would be invisible inside the container.
# Inlining matches what the pre-existing CM-Kirk job already does.
#
# Prometheus there runs WITHOUT --web.enable-lifecycle, so `POST /-/reload` is
# unavailable. Apply changes with `sudo docker restart <prometheus-container>`;
# the TSDB lives in a named volume, so no samples are lost.
#
# Targets are IPs, not *.test256.io names: corporate DNS returns NXDOMAIN for
# that zone, and the container resolves via the Docker daemon's resolver. A
# `node` label carries the friendly name for queries and dashboards.

  # ---- Hosts: CPU (incl. steal), memory, disk, network ----------------------
  # Covers the three cluster nodes AND the load client cm-neptune, which is not
  # part of the cluster. 5s interval: benchmark runs are short and we need
  # resolution finer than the 15s global default.
  - job_name: "node-exporter"
    scrape_interval: 5s
    static_configs:
      - targets: ["192.168.1.188:9100"]
        labels: {node: "kube",       role: "control-plane"}
      - targets: ["192.168.1.187:9100"]
        labels: {node: "sphere",     role: "worker"}
      - targets: ["192.168.1.189:9100"]
        labels: {node: "cone",       role: "worker"}
      - targets: ["192.168.1.193:9100"]
        labels: {node: "cm-neptune", role: "load-client"}

  # ---- cAdvisor: per-pod CPU, the metric the throughput report depends on ----
  # container_cpu_usage_seconds_total is a COUNTER, so rate() over it has no lag.
  # metrics-server (`kubectl top`) lags 15-25s and silently corrupted an earlier
  # aggregation -- a CPU peak landed after the load had already stopped.
  #
  # honor_timestamps: false is REQUIRED, not cosmetic. cAdvisor stamps each sample
  # with its own collection time, and Prometheus honors that by default -- so
  # scraping every 5s just re-ingests an identical (timestamp, value) pair and the
  # effective resolution collapses to the kubelet's cAdvisor housekeeping interval.
  # Measured on this cluster before tuning: the counter advanced once per ~12.6s,
  # so rate(...[15s]) over a 22s PROTECT phase returned data for only 2 of 24 pods.
  # We fix it at both ends: housekeeping-interval=5s (Monitoring/rke2/) makes the
  # samples genuinely fresh, and honor_timestamps: false makes Prometheus stamp
  # them at scrape time so a stalled collector cannot masquerade as a flat counter.
  - job_name: "cadvisor"
    scrape_interval: 5s
    honor_timestamps: false
    scheme: https
    metrics_path: /metrics/cadvisor
    tls_config:
      insecure_skip_verify: true   # RKE2 kubelet serving certs are self-signed per node
    authorization:
      type: Bearer
      credentials: "__K8S_TOKEN__"
    static_configs:
      - targets: ["192.168.1.188:10250"]
        labels: {node: "kube"}
      - targets: ["192.168.1.187:10250"]
        labels: {node: "sphere"}
      - targets: ["192.168.1.189:10250"]
        labels: {node: "cone"}

  # ---- kubelet's own metrics -------------------------------------------------
  - job_name: "kubelet"
    scheme: https
    metrics_path: /metrics
    tls_config:
      insecure_skip_verify: true
    authorization:
      type: Bearer
      credentials: "__K8S_TOKEN__"
    static_configs:
      - targets: ["192.168.1.188:10250"]
        labels: {node: "kube"}
      - targets: ["192.168.1.187:10250"]
        labels: {node: "sphere"}
      - targets: ["192.168.1.189:10250"]
        labels: {node: "cone"}

  # ---- Kubernetes object state (pod phase, replicas, requests/limits) --------
  - job_name: "kube-state-metrics"
    static_configs:
      - targets: ["192.168.1.188:30080"]

  # ---- Control plane ---------------------------------------------------------
  # These four require Monitoring/rke2/apply_rke2_metrics.sh to have been run;
  # RKE2 binds them to 127.0.0.1 out of the box.
  - job_name: "kube-apiserver"
    scheme: https
    tls_config:
      insecure_skip_verify: true
    authorization:
      type: Bearer
      credentials: "__K8S_TOKEN__"
    static_configs:
      - targets: ["192.168.1.188:6443"]
        labels: {node: "kube"}

  - job_name: "etcd"
    static_configs:
      - targets: ["192.168.1.188:2381"]
        labels: {node: "kube"}

  - job_name: "kube-scheduler"
    scheme: https
    tls_config:
      insecure_skip_verify: true
    authorization:
      type: Bearer
      credentials: "__K8S_TOKEN__"
    static_configs:
      - targets: ["192.168.1.188:10259"]
        labels: {node: "kube"}

  - job_name: "kube-controller-manager"
    scheme: https
    tls_config:
      insecure_skip_verify: true
    authorization:
      type: Bearer
      credentials: "__K8S_TOKEN__"
    static_configs:
      - targets: ["192.168.1.188:10257"]
        labels: {node: "kube"}

  - job_name: "kube-proxy"
    static_configs:
      - targets: ["192.168.1.188:10249"]
        labels: {node: "kube"}
      - targets: ["192.168.1.187:10249"]
        labels: {node: "sphere"}
      - targets: ["192.168.1.189:10249"]
        labels: {node: "cone"}
