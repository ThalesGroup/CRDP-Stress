#
# Combined Kubernetes file for deploying CRDP across a multi-node, multi-pod environment
#
# SECTION:  Pod Deployment
#
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    run: crdp
  name: crdp-deployment
spec:
  template:
     metadata:
        name: crdp
        labels:
          run: crdp
     spec:
      containers:
        - image: thalesciphertrust/ciphertrust-restful-data-protection:latest
          imagePullPolicy: IfNotPresent
          name: crdp-image
          env:
            - name: KEY_MANAGER_HOST
              value: "192.168.1.190"
            - name: SERVER_MODE
              value: "no-tls"
            - name: REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: crdp-secret-name
                  key: regtoken
          ports:
            - containerPort: 8090
  replicas: 6
  selector:
      matchLabels:
        run: crdp

---
#
# SECTION:  Service Deployment
#
apiVersion: v1
kind: Service
metadata:
  labels:
    run: crdp
  name: crdp-service
spec:
  selector:
    run: crdp
  type: NodePort
  ports:
    - port: 8090
      nodePort: 32085

---
#
# SECTION:  Access Notes
#
# Default (load-balanced) access:
#   The default deployment path in makeSecretandDeploy.sh applies crdp-ingress.yml, which
#   exposes CRDP via host-based routing through the NGINX Ingress Controller at:
#     http://crdp.test256.io
#   The Service above remains type: NodePort so that both the Ingress path and the direct
#   NodePort fallback can coexist without modification.
#
# Alternative (NodePort-only) access:
#   If the Ingress path is not used, the NodePort service above exposes CRDP directly at:
#     http://<any-node-ip>:32085
#   To use this path, comment out the "kubectl apply -f crdp-ingress.yml" line in
#   makeSecretandDeploy.sh.
#
